<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MHガチャ</title>
<style>
  body{font-family:sans-serif; padding:10px;}
  #weaponStats{margin-top:10px;}
</style>
</head>
<body>

<h2>モンハンガチャ</h2>

<button onclick="rollGacha()">ガチャを回す</button>
<button onclick="addDeath()">乙カウント</button>
<button onclick="resetStats()">統計リセット</button>

<p id="weapon"></p>
<p id="monster"></p>
<p id="rule"></p>
<p id="deathCounter">現在：0乙</p>

<h3>武器統計</h3>
<div id="weaponStats"></div>

<script>
let deathCount = 0;
let lastWeapon = "";

// 武器
const weapons = ["大剣","太刀","片手剣","双剣","ハンマー","狩猟笛","ランス",
"ガンランス","スラッシュアックス","チャージアックス",
"操虫棍","ライトボウガン","ヘビィボウガン","弓"];

// モンスター（ライズ＋サンブレイク大型）
const monstersAll = [
"アオアシラ","アルメッドロン","アマツマガツチ","ウルクスス",
"イソネミクニ","イヴェルカーナ","エスピナス","オロミドロ",
"ガランゴルム","ガイアドゥルム","クシャルダオラ","ゴア・マガラ",
"原初を刻むメルゼナ","ショウグンキザミ","セルレギオス","タマミツネ",
"テオテスカトル","トビカダキ","ナルガクルガ","ビシュテンゴ",
"フルフル","ブジャテンゴ","プケプケ","ヘビィ・ドボル",
"ラージャン","ティガレックス","リオレウス","シルバーリオレウス",
"リオレイア","ゴールドリオレイア"
];

const monstersDanger = [
"原初を刻むメルゼナ","テオテスカトル","クシャルダオラ",
"ラージャン","セルレギオス","イヴェルカーナ"
];

// 縛り（簡易版）
const easyRules=["閃光禁止","砥石3回"];
const normalRules=["回復禁止","捕獲禁止"];
const hellRules=["回復禁止","回避禁止","装備なし","裸で討伐","アイテム禁止"];
const jokeRules=["オトモ任せ","操竜のみ","粉塵係"];

// 統計
let weaponStats = JSON.parse(localStorage.getItem("weaponStats")||"{}");

// ----- ガチャ -----
function rollGacha(){
    deathCount = 0;
    document.getElementById("deathCounter").textContent = "現在：0乙";

    // 武器
    let weapon="";
    weapon = weapons[Math.floor(Math.random()*weapons.length)];
    lastWeapon = weapon;
    document.getElementById("weapon").textContent = "武器：" + weapon;
    if(weapon==="片手剣") document.getElementById("weapon").textContent += " ✨片手剣チャンス！✨";

    if(!weaponStats[weapon]) weaponStats[weapon] = 0;
    weaponStats[weapon]++;

    // モンスター
    let list = monstersAll;
    let monster = list[Math.floor(Math.random()*list.length)];
    document.getElementById("monster").textContent = "モンスター：" + monster;

    // 縛り
    let diff = "normal"; // 仮に固定、自由に変更可
    let arr = normalRules;
    let rule = arr[Math.floor(Math.random()*arr.length)];
    document.getElementById("rule").textContent = "縛り：" + rule;

    saveStats();
    drawStats();
}

// ----- 乙カウント -----
function addDeath(){
    if(deathCount >=3) return;
    deathCount++;
    document.getElementById("deathCounter").textContent = "現在：" + deathCount + "乙";
    if(deathCount >=3) alert("💀 クエスト失敗！");
}

// ----- 統計描画 -----
function drawStats(){
    let ws = document.getElementById("weaponStats");
    ws.innerHTML = "";
    for(let w of Object.keys(weaponStats)){
        ws.innerHTML += `${w} → ${weaponStats[w]}回<br>`;
    }
}

// ----- 保存 -----
function saveStats(){
    localStorage.setItem("weaponStats", JSON.stringify(weaponStats));
}

// ----- リセット -----
function resetStats(){
    weaponStats={};
    localStorage.clear();
    deathCount=0;
    lastWeapon="";
    document.getElementById("deathCounter").textContent="現在：0乙";
    drawStats();
}

drawStats();
</script>
</body>
</html>
