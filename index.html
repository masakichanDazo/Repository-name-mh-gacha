<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モンハンガチャ！</title>
<style>
body{
background:#111;
color:#eee;
font-family:sans-serif;
text-align:center;
padding:40px;
}

h1{
color:#d4af37;
font-size:40px;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
background:#d4af37;
border:none;
border-radius:6px;
cursor:pointer;
}

select{
padding:6px;
margin:6px;
}

.result{
font-size:28px;
margin-top:20px;
color:#7bd6ff;
}

.rule{
color:#ff7b7b;
font-size:20px;
}

.section{
margin-top:40px;
}

.bar{
background:#444;
margin:4px auto;
width:300px;
text-align:left;
}

.bar span{
display:block;
background:#7bd6ff;
height:20px;
}

</style>
</head>

<body>

<h1>モンハンガチャ！</h1>

<div>

武器ガチャ
<select id="weaponToggle">
<option value="on">ON</option>
<option value="off">OFF</option>
</select>

モンスターガチャ
<select id="monsterToggle">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>

<select id="monsterType">
<option value="all">全大型</option>
<option value="danger">危険モンスター</option>
</select>

</div>

<div>

縛り
<select id="ruleToggle">
<option value="off">なし</option>
<option value="on">あり</option>
</select>

<select id="difficulty">
<option value="easy">ゆるめ</option>
<option value="normal">ふつう</option>
<option value="hell">地獄</option>
<option value="joke">ネタ</option>
</select>

</div>

<button onclick="rollGacha()">ガチャを回す！</button>

<div class="result" id="weapon"></div>
<div class="result" id="monster"></div>
<div class="rule" id="rule"></div>

<div>
<button onclick="success()">成功</button>
<button onclick="fail()">失敗</button>
<button onclick="resetStats()">統計リセット</button>
</div>

<div class="section">
<h2>履歴</h2>
<ul id="history"></ul>
</div>

<div class="section">
<h2>武器統計</h2>
<div id="weaponStats"></div>
</div>

<div class="section">
<h2>モンスター統計</h2>
<div id="monsterStats"></div>
</div>

<div class="section">
<h2>死亡率ランキング</h2>
<ul id="deathStats"></ul>
</div>

<script>
// ----- 初期化 -----
const weapons = [
  "大剣","太刀","片手剣","双剣","ハンマー","狩猟笛","ランス",
  "ガンランス","スラッシュアックス","チャージアックス",
  "操虫棍","ライトボウガン","ヘビィボウガン","弓"
];

// ライズ＋サンブレイク大型モンスター
const monstersAll = [
  "アオアシラ","アルメッドロン","アマツマガツチ","ウルクスス",
  "イソネミクニ","イヴェルカーナ","エスピナス","オロミドロ",
  "ガランゴルム","ガイアドゥルム","クシャルダオラ","ゴア・マガラ",
  "原初を刻むメルゼナ","ショウグンキザミ","セルレギオス","タマミツネ",
  "テオテスカトル","トビカダキ","ナルガクルガ","ビシュテンゴ",
  "フルフル","ブジャテンゴ","プケプケ","ヘビィ・ドボル",
  "ラージャン","ティガレックス","リオレウス","シルバーリオレウス",
  "リオレイア","ゴールドリオレイア"
];

const monstersDanger = [
  "激昂ラージャン","紅蓮滾るバゼルギウス","奇しき赫耀のバルファルク"
];

// 簡易縛り
const easyRules = ["閃光禁止","砥石3回"];
const normalRules = ["回復禁止","捕獲禁止"];
const hellRules = ["防具なし","アイテム持込禁止"];
const jokeRules = ["オトモ任せ","操竜のみ","粉塵係"];

// ----- 保存データ -----
let weaponStats = JSON.parse(localStorage.getItem("weaponStats") || "{}");
let successFailStats = JSON.parse(localStorage.getItem("successFailStats") || "{}");

let lastWeapon = "";
let lastMonster = "";
let lastRule = "";

// ----- 今日の武器 -----
const today = new Date().toDateString();
if(!localStorage.getItem("dailyWeaponDate") || localStorage.getItem("dailyWeaponDate") !== today){
  const dailyWeapon = weapons[Math.floor(Math.random()*weapons.length)];
  localStorage.setItem("dailyWeapon", dailyWeapon);
  localStorage.setItem("dailyWeaponDate", today);
}
document.getElementById("dailyWeapon").textContent = "今日の武器："+localStorage.getItem("dailyWeapon");

// ----- ガチャ -----
function rollGacha(){
  // まず表示をリセット
  document.getElementById("weapon").textContent = "";
  document.getElementById("monster").textContent = "";
  document.getElementById("rule").textContent = "";

  let weapon="", monster="", rule="";

  // 武器
  if(document.getElementById("weaponToggle").value==="on"){
    weapon = weapons[Math.floor(Math.random()*weapons.length)];
    lastWeapon = weapon;
    document.getElementById("weapon").textContent = "武器：" + weapon;

    if(!weaponStats[weapon]) weaponStats[weapon] = { success:0, fail:0, count:0 };
    weaponStats[weapon].count++;
  }

  // モンスター
  if(document.getElementById("monsterToggle").value==="on"){
    let list = document.getElementById("monsterType").value==="danger" ? monstersDanger : monstersAll;
    monster = list[Math.floor(Math.random()*list.length)];
    lastMonster = monster;
    document.getElementById("monster").textContent = "モンスター：" + monster;
  }

  // 縛り
  if(document.getElementById("ruleToggle").value==="on"){
    let diff = document.getElementById("difficulty").value;
    let arr = normalRules;
    if(diff==="easy") arr = easyRules;
    if(diff==="hell") arr = hellRules;
    if(diff==="joke") arr = jokeRules;
    rule = arr[Math.floor(Math.random()*arr.length)];
    lastRule = rule;
    document.getElementById("rule").textContent = "縛り：" + rule;
  }

  saveStats();
  drawStats();
}

// ----- 成功/失敗 -----
function success(){
  if(lastWeapon){
    weaponStats[lastWeapon].success++;
    saveStats();
    drawStats();
  }
}
function fail(){
  if(lastWeapon){
    weaponStats[lastWeapon].fail++;
    saveStats();
    drawStats();
  }
}

// ----- 描画 -----
function drawStats(){
  // 武器統計
  const ws = document.getElementById("weaponStats");
  ws.innerHTML = "";
  for(let w in weaponStats){
    const s = weaponStats[w];
    ws.innerHTML += `${w} → ${s.count}回 (成功:${s.success} 失敗:${s.fail})<br>`;
  }
}

// ----- 保存 -----
function saveStats(){
  localStorage.setItem("weaponStats", JSON.stringify(weaponStats));
  localStorage.setItem("successFailStats", JSON.stringify(successFailStats));
}

// ----- リセット -----
function resetStats(){
  weaponStats = {};
  successFailStats = {};
  localStorage.clear();
  drawStats();
}

// 最初に描画
drawStats();
</script>

</body>
</html>
