<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モンハンガチャ！</title>
<style>
body{
background:#111;
color:#eee;
font-family:sans-serif;
text-align:center;
padding:40px;
}

h1{
color:#d4af37;
font-size:40px;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
background:#d4af37;
border:none;
border-radius:6px;
cursor:pointer;
}

select{
padding:6px;
margin:6px;
}

.result{
font-size:28px;
margin-top:20px;
color:#7bd6ff;
}

.rule{
color:#ff7b7b;
font-size:20px;
}

.section{
margin-top:40px;
}

.bar{
background:#444;
margin:4px auto;
width:300px;
text-align:left;
}

.bar span{
display:block;
background:#7bd6ff;
height:20px;
}

</style>
</head>

<body>

<h1>モンハンガチャ！</h1>
  <h2 id="dailyWeapon"></h2>

<div>

武器ガチャ
<select id="weaponToggle">
<option value="on">ON</option>
<option value="off">OFF</option>
</select>

モンスターガチャ
<select id="monsterToggle">
<option value="off">OFF</option>
<option value="on">ON</option>
</select>

<select id="monsterType">
<option value="all">全大型</option>
<option value="danger">危険モンスター</option>
</select>

</div>

<div>

縛り
<select id="ruleToggle">
<option value="off">なし</option>
<option value="on">あり</option>
</select>

<select id="difficulty">
<option value="easy">ゆるめ</option>
<option value="normal">ふつう</option>
<option value="hell">地獄</option>
<option value="joke">ネタ</option>
</select>

</div>

<button onclick="rollGacha()">ガチャを回す！</button>

<div class="result" id="weapon"></div>
<div class="result" id="monster"></div>
<div class="rule" id="rule"></div>

<div>
<h3 id="deathCounter">現在：0乙</h3>
<button onclick="addDeath()">💀 1乙</button>
<button onclick="resetStats()">統計リセット</button>
</div>

<div class="section">
<h2>履歴</h2>
<ul id="history"></ul>
</div>

<div class="section">
<h2>武器統計</h2>
<div id="weaponStats"></div>
</div>

<div class="section">
<h2>モンスター統計</h2>
<div id="monsterStats"></div>
</div>

<div class="section">
<h2>死亡率ランキング</h2>
<ul id="deathStats"></ul>
</div>

<script>
 let deathCount = 0;
let lastWeapon = "";
let weaponStats = {}; // 武器ごとの統計
const weapons = ["片手剣","太刀","大剣","ハンマー","ランス"]; // 好きな武器リスト

function rollGacha() {
    // 武器決定
    let weapon = weapons[Math.floor(Math.random()*weapons.length)];
    lastWeapon = weapon;
    document.getElementById("weapon").textContent = "武器：" + weapon;

    if(weapon === "片手剣"){
        document.getElementById("weapon").textContent += " ✨片手剣チャンス！✨";
    }

    // 武器統計初期化
    if(!weaponStats[weapon]){
        weaponStats[weapon] = { success: 0, fail: 0 };
    }

    // 成功判定（2乙以下で成功）
    if(deathCount < 3){
        weaponStats[weapon].success++;
    }

    updateWeaponStats();

    // 乙カウンターリセット
    deathCount = 0;
    document.getElementById("deathCounter").textContent = "現在：0乙";
}

function addDeath() {
    deathCount++;
    document.getElementById("deathCounter").textContent = "現在：" + deathCount + "乙";

    if(deathCount >= 3){
        alert("💀 クエスト失敗！");
        if(lastWeapon){
            weaponStats[lastWeapon].fail++;
        }
        updateWeaponStats();
    }
}

function updateWeaponStats(){
    let statText = "";
    for(let w in weaponStats){
        let s = weaponStats[w].success;
        let f = weaponStats[w].fail;
        let rate = (s + f > 0) ? Math.round(f / (s + f) * 100) : 0;
        statText += `${w} → 成功:${s} 失敗:${f} 死亡率:${rate}%\n`;
    }
    document.getElementById("weaponStats").textContent = statText;
}
</script>

</body>
</html>
