<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MHガチャ</title>
<style>
body { font-family:sans-serif; padding:10px; }
#weaponStats, #successFailStats { margin-top:10px; }
button { margin-right:5px; margin-top:5px; }
</style>
</head>
<body>

<h2>モンハンガチャ</h2>

<button onclick="rollGacha()">ガチャを回す</button>
<button onclick="resetStats()">統計リセット</button>
<button onclick="markSuccess()">成功</button>
<button onclick="markFail()">失敗</button>

<p id="weapon"></p>
<p id="monster"></p>
<p id="rule"></p>

<h3>武器統計（出た武器のみ）</h3>
<div id="weaponStats"></div>

<h3>成功/失敗回数</h3>
<div id="successFailStats"></div>

<script>
// ----- 初期化 -----
let weaponStats = JSON.parse(localStorage.getItem("weaponStats") || "{}");
let successFailStats = JSON.parse(localStorage.getItem("successFailStats") || '{"success":0,"fail":0}');

let lastWeapon = "";
let lastMonster = "";
let lastRule = "";

// ----- 武器・モンスター・縛り -----
const weapons = ["大剣","太刀","片手剣","双剣","ハンマー","狩猟笛","ランス",
"ガンランス","スラッシュアックス","チャージアックス",
"操虫棍","ライトボウガン","ヘビィボウガン","弓"];

// ライズ＋サンブレイク 大型モンスター全種
const monstersAll = [
"アオアシラ","アルメッドロン","アマツマガツチ","ウルクスス",
"イソネミクニ","イヴェルカーナ","エスピナス","オロミドロ",
"ガランゴルム","ガイアドゥルム","クシャルダオラ","ゴア・マガラ",
"原初を刻むメルゼナ","ショウグンキザミ","セルレギオス","タマミツネ",
"テオテスカトル","トビカダキ","ナルガクルガ","ビシュテンゴ",
"フルフル","ブジャテンゴ","プケプケ","ヘビィ・ドボル",
"ラージャン","ティガレックス","リオレウス","シルバーリオレウス",
"リオレイア","ゴールドリオレイア"
];

// 縛り（簡易版）
const easyRules=["閃光禁止","砥石3回"];
const normalRules=["回復禁止","捕獲禁止"];
const hellRules=["回復禁止","回避禁止","装備なし","裸で討伐","アイテム禁止"];
const jokeRules=["オトモ任せ","操竜のみ","粉塵係"];

// ----- ガチャ -----
function rollGacha() {
    // 武器
    let weapon = weapons[Math.floor(Math.random()*weapons.length)];
    lastWeapon = weapon;
    document.getElementById("weapon").textContent = "武器：" + weapon;
    if(!weaponStats[weapon]) weaponStats[weapon] = 0;
    weaponStats[weapon]++;

    // モンスター
    let monster = monstersAll[Math.floor(Math.random()*monstersAll.length)];
    lastMonster = monster;
    document.getElementById("monster").textContent = "モンスター：" + monster;

    // 縛り
    let diff = "normal"; // 任意で変更可能
    let arr = normalRules;
    if(diff==="easy") arr = easyRules;
    if(diff==="hell") arr = hellRules;
    if(diff==="joke") arr = jokeRules;
    let rule = arr[Math.floor(Math.random()*arr.length)];
    lastRule = rule;
    document.getElementById("rule").textContent = "縛り：" + rule;

    saveStats();
    drawStats();
}

// ----- 成功/失敗カウント -----
function markSuccess(){
    successFailStats.success++;
    saveStats();
    drawStats();
}

function markFail(){
    successFailStats.fail++;
    saveStats();
    drawStats();
}

// ----- 描画 -----
function drawStats(){
    let ws = document.getElementById("weaponStats");
    ws.innerHTML = "";
    for(let w of Object.keys(weaponStats)){
        ws.innerHTML += `${w} → ${weaponStats[w]}回<br>`;
    }

    let sf = document.getElementById("successFailStats");
    sf.innerHTML = `成功：${successFailStats.success}回<br>失敗：${successFailStats.fail}回`;
}

// ----- 保存 -----
function saveStats(){
    localStorage.setItem("weaponStats", JSON.stringify(weaponStats));
    localStorage.setItem("successFailStats", JSON.stringify(successFailStats));
}

// ----- リセット -----
function resetStats(){
    weaponStats = {};
    successFailStats = {"success":0,"fail":0};
    localStorage.clear();
    drawStats();
}

// 最初に描画
drawStats();
</script>

</body>
</html>
